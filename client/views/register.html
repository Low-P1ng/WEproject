<!-- Register View -->
<div class="container">
  <div class="card form-card animate-in" style="margin-top: 40px;">
    <h2>Create Account</h2>
    <p class="form-subtitle">Join BlogVerse and start sharing your stories</p>

    <div class="alert alert-error" ng-show="error">{{ error }}</div>

    <form ng-submit="register()" id="register-form">
      <div class="form-group">
        <label class="form-label" for="reg-username">Username</label>
        <input type="text" class="form-control" id="reg-username"
               ng-model="registerData.username" placeholder="Choose a username" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-email">Email</label>
        <input type="email" class="form-control" id="reg-email"
               ng-model="registerData.email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input type="password" class="form-control" id="reg-password"
               ng-model="registerData.password" placeholder="At least 6 characters" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-bio">Bio (optional)</label>
        <textarea class="form-control" id="reg-bio"
                  ng-model="registerData.bio" placeholder="Tell us about yourself..."
                  style="min-height: 80px;"></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" id="register-submit"
              style="width: 100%;" ng-disabled="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p style="text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 0.9rem;">
      Already have an account? <a href="#!/login">Log in</a>
    </p>
  </div>
</div>
