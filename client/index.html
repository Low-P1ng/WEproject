<!DOCTYPE html>
<html lang="en" ng-app="blogApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A modern full-stack blog platform built with AngularJS, Node.js, Express, and MongoDB Atlas.">
  <title>BlogVerse — Modern Blog Platform</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar" id="main-navbar">
    <div class="navbar-inner">
      <a href="#!/" class="navbar-brand" id="brand-link">BlogVerse</a>
      <ul class="navbar-nav">
        <li><a href="#!/" class="nav-link" id="nav-home">Home</a></li>
        <li ng-hide="isLoggedIn()"><a href="#!/login" class="nav-link" id="nav-login">Log In</a></li>
        <li ng-hide="isLoggedIn()"><a href="#!/register" class="nav-link nav-link-accent" id="nav-register">Sign Up</a></li>
        <li ng-show="isLoggedIn()"><a href="#!/dashboard" class="nav-link" id="nav-dashboard">Dashboard</a></li>
        <li ng-show="isLoggedIn()"><a href="#!/create" class="nav-link nav-link-accent" id="nav-create">+ New Post</a></li>
        <li ng-show="isLoggedIn()">
          <button class="nav-link" ng-click="logout()" id="nav-logout">Logout</button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- SPA View Container -->
  <div class="page-wrapper">
    <div ng-view class="animate-in"></div>
  </div>

  <!-- Footer -->
  <footer class="footer" id="main-footer">
    <div class="container">
      <p>BlogVerse — Built with AngularJS, Node.js, Express & MongoDB</p>
    </div>
  </footer>

  <!-- AngularJS 1.8 from CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-sanitize.min.js"></script>

  <!-- App Module -->
  <script src="app.js"></script>

  <!-- Services -->
  <script src="services/authService.js"></script>
  <script src="services/postService.js"></script>

  <!-- Controllers -->
  <script src="controllers/homeController.js"></script>
  <script src="controllers/authController.js"></script>
  <script src="controllers/postController.js"></script>
  <script src="controllers/dashboardController.js"></script>
</body>
</html>
